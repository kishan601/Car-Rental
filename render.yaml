services:
  - type: web
    name: autorent
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/car-rental run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: "cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true